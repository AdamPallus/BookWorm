<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bookworm</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <style>
    :root {
      --bg: #1a1a1a;
      --bg-2: #242220;
      --surface: #2a2725;
      --surface-2: #2e2a27;
      --border: #3a3530;
      --text: #e8e0d4;
      --text-muted: #c0b6a7;
      --accent: #d4a048;
      --danger: #cc6b5a;
      --card-radius: 14px;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --reader-max-width: 980px;
      --app-vh: 1vh;
      --reader-controls-height: 0px;
      --reader-topbar-height: 0px;
      --reader-toggle-clearance: 30px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(90vw 60vh at 20% -10%, #34302b 0%, var(--bg) 50%) no-repeat,
                  linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px;
    }

    .hidden { display: none !important; }

    .top-shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      color: var(--text-muted);
      margin: 4px 0 0;
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    button:hover:not(:disabled) {
      background: #35312d;
      border-color: #4a433c;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-accent {
      background: linear-gradient(180deg, #deab55, #c58f33);
      color: #231a0e;
      border-color: #c58f33;
      font-weight: 700;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .status-pill {
      font-size: 12px;
      color: #231a0e;
      background: var(--accent);
      border-radius: 999px;
      padding: 3px 8px;
      font-weight: 700;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .book-card {
      position: relative;
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      background: linear-gradient(180deg, #2f2c29, #292623);
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .book-delete {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      padding: 0;
      border: 1px solid #5d4c44;
      background: rgba(26, 24, 22, 0.75);
      color: #e4d6c4;
      z-index: 3;
      font-size: 16px;
      line-height: 1;
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background: linear-gradient(140deg, #52483f 0%, #322d29 40%, #2a2521 100%);
      border-bottom: 1px solid var(--border);
    }

    .book-cover-wrap {
      display: flex;
      flex-direction: column;
    }

    .book-cover.fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      text-align: center;
      font-family: Georgia, serif;
      font-size: 18px;
      line-height: 1.35;
      color: #eadcc8;
    }

    .book-cover-actions {
      padding: 8px 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .book-cover-link {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: #e4d6c4;
      text-decoration: none;
      border: 1px solid #5d4c44;
      border-radius: 999px;
      background: rgba(26, 24, 22, 0.72);
      padding: 5px 10px;
    }

    .book-cover-link:hover {
      color: #f4e9da;
      border-color: #8b704f;
      background: rgba(36, 33, 30, 0.9);
    }

    .book-meta {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .book-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-author {
      margin: 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .book-sub {
      margin: 0;
      color: #d6c9b8;
      font-size: 12px;
    }

    .book-progress {
      margin-top: auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      height: 8px;
      background: #201d1b;
      overflow: hidden;
    }

    .book-progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #a9762a, #e2b560);
      width: 0;
      transition: width 220ms ease;
    }

    .empty-state {
      border: 1px dashed #5a5046;
      border-radius: 18px;
      padding: 36px;
      text-align: center;
      color: var(--text-muted);
      background: rgba(42, 39, 37, 0.55);
    }

    .import-status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 20px;
    }

    .reader-shell {
      position: fixed;
      inset: 0;
      height: calc(var(--app-vh) * 100);
      background: linear-gradient(180deg, #1f1d1b 0%, #1a1918 100%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reader-controls {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 44;
      overflow-x: hidden;
      overflow-y: auto;
      max-height: min(72vh, 420px);
      opacity: 1;
      transition: max-height 180ms ease, opacity 180ms ease;
    }

    .reader-shell.controls-collapsed .reader-controls {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .reader-topbar {
      min-height: 48px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      background: #24211f;
    }

    .reader-topbar .meta {
      min-width: 0;
    }

    .reader-title {
      margin: 0;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
    }

    .reader-progress {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reader-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .reader-actions select {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 8px 10px;
      min-width: 92px;
    }

    #chapterJumpSelect {
      min-width: 180px;
      max-width: 280px;
      width: min(34vw, 280px);
    }

    .reader-actions .nav-btn {
      min-width: 64px;
      padding: 8px 10px;
    }

    #bookmarkToggleBtn {
      min-width: 112px;
    }

    #bookmarksBtn,
    #tocBtn,
    #syncBtn {
      min-width: 72px;
      padding: 8px 10px;
    }

    .sync-banner {
      border-bottom: 1px solid var(--border);
      background: #2a2420;
      color: #e8dccb;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      font-size: 13px;
      flex-wrap: wrap;
    }

    .sync-banner.open {
      display: flex;
    }

    .sync-banner-meta {
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 6px;
    }

    .sync-banner-actions {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .sync-banner-actions button {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .reader-controls-toggle {
      position: absolute;
      top: calc(var(--reader-controls-height) + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid #5a4f45;
      background: rgba(42, 38, 35, 0.9);
      color: #d8c9b2;
      padding: 0;
      line-height: 1;
      font-size: 14px;
      z-index: 45;
      transition: top 180ms ease, background 160ms ease, border-color 160ms ease;
    }

    .reader-controls-toggle:hover:not(:disabled) {
      transform: translateX(-50%);
    }

    .reader-shell.controls-collapsed .reader-controls-toggle {
      top: 8px;
    }

    .reader-main {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      position: relative;
      overflow: hidden;
      padding-top: var(--reader-toggle-clearance);
      box-sizing: border-box;
    }

    .reader-frame {
      width: min(100%, var(--reader-max-width));
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      background: var(--surface-2);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    #readerSurface {
      width: 100%;
      height: 100%;
      flex: 1;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .reader-shell[data-active-reader-mode="scroll"] .turn-zone {
      display: none;
    }

    .bw-scroll-chapter-nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 14px 24px 28px;
      border-top: 1px solid rgba(232, 224, 212, 0.12);
      margin-top: 8px;
    }

    .bw-scroll-chapter-nav button {
      min-width: 132px;
    }

    .reader-searchbar {
      border-bottom: 1px solid var(--border);
      background: #221f1d;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
    }

    .reader-searchbar input {
      flex: 1;
      min-width: 140px;
      border: 1px solid #4a433c;
      border-radius: 10px;
      background: #1f1c1a;
      color: var(--text);
      padding: 8px 10px;
    }

    .reader-searchbar button {
      min-width: 52px;
      padding: 8px 10px;
    }

    .reader-search-status {
      min-width: 86px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      white-space: nowrap;
    }

    .reader-sidepanels {
      position: absolute;
      top: calc(var(--reader-controls-height) + 12px);
      left: 12px;
      right: auto;
      z-index: 52;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: min(94vw, 420px);
    }

    .reader-panel {
      pointer-events: auto;
      display: none;
      flex-direction: column;
      background: rgba(37, 33, 30, 0.96);
      border: 1px solid #4b433b;
      border-radius: 12px;
      box-shadow: var(--shadow);
      max-height: min(68vh, 620px);
      overflow: hidden;
      width: min(420px, 92vw);
      min-height: 0;
    }

    .reader-panel.open {
      display: flex;
    }

    .reader-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #4b433b;
      background: rgba(31, 28, 26, 0.96);
      font-size: 13px;
      font-weight: 700;
    }

    .reader-panel-header button {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 8px;
    }

    .reader-panel-list {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 8px;
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      flex-direction: column;
      gap: 6px;
    }

    .reader-panel-empty {
      color: var(--text-muted);
      font-size: 12px;
      padding: 10px 4px 12px;
    }

    .bookmark-item {
      border: 1px solid #51483f;
      border-radius: 10px;
      background: #322d29;
      padding: 8px 9px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .bookmark-main {
      min-width: 0;
    }

    .bookmark-label {
      margin: 0;
      font-size: 12px;
      color: #eadbc4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-sub {
      margin: 4px 0 0;
      font-size: 11px;
      color: #b8a999;
    }

    .bookmark-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .bookmark-actions button {
      min-width: 56px;
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 8px;
    }

    .toc-item {
      border: 1px solid #4c433b;
      border-radius: 10px;
      background: #2f2a26;
      padding: 6px 8px;
      font-size: 12px;
      color: #e0d3bf;
      text-align: left;
      white-space: normal;
      word-break: break-word;
      transform: none !important;
    }

    .toc-item:hover:not(:disabled) {
      background: #3a332e;
    }

    .reader-status {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 14px;
      z-index: 18;
      pointer-events: none;
    }

    .reader-status.visible {
      display: flex;
    }

    .turn-zone {
      position: absolute;
      top: 0;
      width: 16%;
      height: 100%;
      z-index: 15;
      cursor: pointer;
      background: transparent;
    }

    .turn-zone.left { left: 0; }
    .turn-zone.right { right: 0; }
    .turn-zone.disabled { pointer-events: none; }

    .qa-fab {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      font-size: 20px;
      border: none;
      color: #2a1d08;
      background: radial-gradient(circle at 35% 30%, #f4c973, #cf9941 60%, #b9802d);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.35);
      z-index: 35;
    }

    .return-controls {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 36;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .return-controls.open {
      display: flex;
    }

    .return-btn {
      border: 1px solid #9b6e2d;
      background: linear-gradient(180deg, #e0b25f, #c58c35);
      color: #2a1b08;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
      border-radius: 999px;
      white-space: nowrap;
    }

    .return-dismiss {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      padding: 0;
      border: 1px solid #6d5a4f;
      background: rgba(35, 31, 28, 0.9);
      color: #dcccb7;
    }

    .qa-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(7, 6, 5, 0.45);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .qa-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .qa-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      max-width: 100vw;
      height: calc(var(--app-vh) * 100);
      background: #262320;
      border-left: 1px solid var(--border);
      z-index: 45;
      transform: translateX(100%);
      transition: transform 190ms ease;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    .qa-panel.open {
      transform: translateX(0);
    }

    .qa-header {
      border-bottom: 1px solid var(--border);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .qa-header h3 {
      margin: 0;
      font-size: 15px;
    }

    .qa-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qa-controls button {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      padding: 0;
    }

    .qa-context {
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      padding: 10px 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qa-context-link {
      border: 1px solid #6e5b49;
      border-radius: 999px;
      background: rgba(38, 33, 29, 0.9);
      color: #dec8a6;
      font-size: 11px;
      padding: 4px 8px;
      line-height: 1.2;
    }

    .qa-messages {
      overflow-y: auto;
      min-height: 0;
      padding: 14px 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 92%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .msg-user {
      align-self: flex-end;
      background: linear-gradient(180deg, #d8ac62, #bb8840);
      color: #261b0c;
      border-bottom-right-radius: 4px;
      font-weight: 600;
    }

    .msg-ai {
      align-self: flex-start;
      background: #35302c;
      border: 1px solid #45403a;
      border-bottom-left-radius: 4px;
    }

    .citation-link {
      color: #e8bf73;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }

    .citation-link-fallback {
      color: #d7b89a;
      text-decoration-style: dotted;
    }

    .citation-debug {
      margin-top: 8px;
      border-top: 1px solid #4a433c;
      padding-top: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      color: #b8a999;
      white-space: pre-wrap;
    }

    .citation-debug summary {
      cursor: pointer;
      color: #d8c4ae;
      font-family: inherit;
      font-size: 11px;
      user-select: none;
      margin-bottom: 4px;
    }

    .citation-debug pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-state {
      color: var(--text-muted);
      font-size: 12px;
      padding-left: 2px;
    }

    .qa-answer-meta {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #4a433c;
      color: #b8a999;
      font-size: 11px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .qa-thread {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qa-thread-followups {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-left: 18px;
      padding-left: 10px;
      border-left: 2px solid #45403a;
    }

    .qa-followup-toggle {
      align-self: flex-start;
      margin-top: 6px;
      background: transparent;
      border: 1px solid #5a5048;
      color: #d8c4ae;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      cursor: pointer;
    }

    .qa-followup-toggle:hover { background: #3a342f; }

    .qa-followup-composer {
      align-self: stretch;
      margin-top: 6px;
      background: #2b2724;
      border: 1px solid #4a433c;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .qa-followup-composer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #b8a999;
      font-size: 11px;
    }

    .qa-followup-composer-header button {
      background: transparent;
      border: none;
      color: #b8a999;
      font-size: 12px;
      cursor: pointer;
    }

    .qa-followup-composer textarea {
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      border: 1px solid #4a433c;
      border-radius: 8px;
      background: #1f1c1a;
      color: var(--text);
      padding: 8px;
      outline: none;
      font: inherit;
      font-size: 13px;
    }

    .qa-followup-composer textarea:focus {
      border-color: #8c6a37;
      box-shadow: 0 0 0 2px rgba(212, 160, 72, 0.2);
    }

    .qa-followup-composer .qa-followup-actions {
      display: flex;
      justify-content: flex-end;
    }

    .qa-followup-composer .qa-followup-send {
      padding: 5px 12px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      color: #2f210f;
      background: linear-gradient(180deg, #e2b560, #c18834);
      cursor: pointer;
      font-size: 12px;
    }

    .qa-followup-composer .qa-followup-send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .source-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .source-item {
      border: 1px solid #4d453d;
      border-radius: 8px;
      background: #2f2a26;
      padding: 8px;
      color: #d0c2af;
      font-size: 12px;
      line-height: 1.35;
    }

    .qa-input-wrap {
      border-top: 1px solid var(--border);
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      background: #25221f;
    }

    .qa-input-wrap textarea {
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      border: 1px solid #4a433c;
      border-radius: 10px;
      background: #1f1c1a;
      color: var(--text);
      padding: 10px;
      outline: none;
    }

    .qa-input-wrap textarea:focus {
      border-color: #8c6a37;
      box-shadow: 0 0 0 2px rgba(212, 160, 72, 0.2);
    }

    .qa-input-wrap .send-btn {
      padding: 0 14px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      color: #2f210f;
      background: linear-gradient(180deg, #e2b560, #c18834);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
      padding: 16px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      width: min(460px, 100%);
      border-radius: 14px;
      background: #2b2724;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      max-height: calc((var(--app-vh) * 100) - 32px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal h3 {
      margin: 0;
      padding: 18px 18px 14px;
      font-size: 18px;
      flex: 0 0 auto;
    }

    .modal-body {
      overflow: auto;
      padding: 0 18px 10px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid #4a433c;
      border-radius: 10px;
      background: #1f1c1a;
      padding: 9px 10px;
      color: var(--text);
    }

    .field input[type=range] {
      padding: 0;
      accent-color: var(--accent);
    }

    .range-value {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .reader-virtual-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 6px;
    }

    .reader-virtual-actions button {
      width: 100%;
    }

    .row-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 0;
      padding: 12px 18px 18px;
      border-top: 1px solid var(--border);
      background: #2b2724;
      flex: 0 0 auto;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    @media (max-width: 1024px) {
      .qa-panel { width: 80vw; }
      .reader-frame { width: 100%; }
      body { padding: 18px; }
    }

    @media (max-width: 767px) {
      .qa-panel { width: 100vw; }
      .header { flex-wrap: wrap; }
      .book-grid { grid-template-columns: 1fr; }
      .reader-topbar {
        grid-template-columns: auto 1fr;
        grid-template-areas:
          "left right"
          "meta meta";
        height: auto;
        padding: 8px;
      }
      .reader-topbar .back-btn { grid-area: left; }
      .reader-topbar .meta { grid-area: meta; }
      .reader-topbar .reader-actions { grid-area: right; justify-self: end; }
      .reader-sidepanels {
        left: 8px;
        top: calc(var(--reader-controls-height) + 8px);
        max-width: calc(100vw - 16px);
      }
      .reader-panel {
        width: calc(100vw - 16px);
      }
      #readerSurface { height: 100%; }
      #chapterJumpSelect { width: min(52vw, 260px); min-width: 130px; }
      .reader-search-status { min-width: 0; font-size: 11px; }
    }
  </style>

<body>
  <div class="top-shell" id="libraryView">
    <div class="header">
      <div>
        <h1 class="title">Bookworm</h1>
        <p class="subtitle">Read your EPUBs and ask spoiler-safe questions.</p>

      <div class="header-actions">

  <div id="readerView" class="reader-shell hidden">

          <p id="readerProgress" class="reader-progress"></p>
        </div>
        <div class="reader-actions">

          <button id="nextPageBtn" class="nav-btn" title="Next page">Next</button>
          <select id="chapterJumpSelect" title="Jump to chapter">
            <option value="">Chapters</option>
          </select>
          <button id="tocBtn" title="Table of contents" aria-label="Open table of contents">☰</button>
          <button id="syncBtn" title="Check reading position from server">Sync</button>
          <button id="bookmarkToggleBtn" title="Bookmark current page">☆ Bookmark</button>
          <button id="bookmarksBtn" title="View bookmarks">Bookmarks</button>
          <select id="readerSpreadSelect" title="Page layout">
            <option value="single">Single</option>
            <option value="double">Double</option>

      <div id="syncBanner" class="sync-banner">

          <span id="syncBannerMeta" class="sync-banner-meta"></span>

      </div>

      <div id="readerSearchBar" class="reader-searchbar">
        <input id="readerSearchInput" type="search" placeholder="Search text in book" />
        <button id="readerSearchRun" title="Search">Find</button>
        <button id="readerSearchPrev" title="Previous match">↑</button>
        <button id="readerSearchNext" title="Next match">↓</button>

    <div id="readerMain" class="reader-main">

        <div id="bookmarksPanel" class="reader-panel">

        <div id="turnLeft" class="turn-zone left" title="Previous page"></div>

      <button id="qaFab" class="qa-fab" title="Ask about this book">💬</button>

  </div>

  <div id="qaBackdrop" class="qa-backdrop"></div>
  <aside id="qaPanel" class="qa-panel">
    <div class="qa-header">
      <h3>Ask about this book</h3>
      <div class="qa-controls">
        <button id="qaBackBtn" title="Previous answer">◀</button>
        <button id="qaForwardBtn" title="Next answer">▶</button>
        <button id="qaCloseBtn" title="Close">✕</button>
      </div>
    </div>
    <div id="qaContext" class="qa-context">

  <script>
    /* ──────────────────────────── Utilities ──────────────────────────── */
    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function asNumber(value, fallback) { const n = Number(value); return Number.isFinite(n) ? n : (fallback ?? 0); }
    function isCitationDebugEnabled() { return !!(state.settings && state.settings.citation_debug_mode); }

    function syncViewportMetrics() {
      const vh = window.visualViewport ? window.visualViewport.height * 0.01 : window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--app-vh', `${vh}px`);
      if (els.readerControls) document.documentElement.style.setProperty('--reader-controls-height', `${els.readerControls.offsetHeight || 0}px`);
      if (els.readerTopbar) document.documentElement.style.setProperty('--reader-topbar-height', `${els.readerTopbar.offsetHeight || 0}px`);
    }

    function scheduleControlsMetricsSync(delayMs = 220) {
      clearTimeout(state.controlsMetricsTimer);
      state.controlsMetricsTimer = setTimeout(() => { syncViewportMetrics(); state.controlsMetricsTimer = null; }, delayMs);
    }

    function withTimeout(promise, ms, label) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error(`Timeout (${label}): ${ms}ms`)), ms);
        promise.then(val => { clearTimeout(timer); resolve(val); }, err => { clearTimeout(timer); reject(err); });
      });
    }

    function relativeTime(timestamp) {
      if (!timestamp) return '';
      const diff = Date.now() - new Date(timestamp).getTime();
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.round(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.round(diff / 3600000)}h ago`;
      if (diff < 604800000) return `${Math.round(diff / 86400000)}d ago`;
      return new Date(timestamp).toLocaleDateString();
    }

    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    function escapeAttr(text) { return String(text||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function normalizeText(text) { return (text || '').replace(/\s+/g, ' ').trim(); }
    function escapeRegex(value) { return String(value||'').replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function canonicalizeText(text) { return (text || '').toLowerCase().replace(/[^a-z0-9]+/g, ''); }
    function eventTargetElement(event) {
      const t = event && event.target;
      if (t instanceof Element) return t;
      if (t && t.parentElement instanceof Element) return t.parentElement;
      return null;
    }
    function closestFromEvent(event, selector) {
      const el = eventTargetElement(event);
      return el && typeof el.closest === 'function' ? el.closest(selector) : null;
    }
    function readerDiag(...args) {
      const enabledByQuery = new URLSearchParams(window.location.search).has('readerDebug');
      const enabledByStorage = (() => {
        try { return window.localStorage.getItem('bookwormReaderDebug') === '1'; }
        catch (_) { return false; }
      })();
      if (enabledByQuery || enabledByStorage) console.debug('[bookworm-reader]', ...args);
    }

    /* ──────────────────────────── State ──────────────────────────── */
    const state = {
      settings: null, books: [], currentBookId: null, currentBook: null,
      chapters: [], currentPosition: null, answerHistory: [], answerHistoryIndex: -1, followUpComposerSessionId: null,
      ebook: null, readerReady: false, chapterJumpInFlight: false,
      pendingPosition: null, positionTimer: null, lastPositionSentAt: 0,
      isAsking: false, returnStack: [], returnDismissTimer: null, suppressReturnDismissUntil: 0,
      citationHighlightCleanups: [],
      searchQuery: '', searchMatches: [], searchMatchIndex: -1, searchReturnCaptured: false,
      bookmarks: [], tocItems: [],
      virtualChapters: { enabled: false, pattern: null, detection_mode: "strict", toc_display_mode: 'merged', entries: [] },
      controlsCollapsed: false, controlsLayoutTimer: null, controlsMetricsTimer: null,
      syncPromptPosition: null, syncPromptDismissedKey: null,
      activeReaderMode: 'paginated', readerScrollTimer: null,

    };

    const els = {

      returnControls: document.getElementById('returnControls'),

      returnDismissBtn: document.getElementById('returnDismissBtn'),

      qaInput: document.getElementById('qaInput'),

    /* ─────────── Status Messages ─────────── */
    function showReaderStatusMessage(message, durationMs = 1800) {
      els.readerStatus.textContent = message;
      els.readerStatus.classList.add('visible');
      setTimeout(() => {
        if (els.readerStatus.textContent === message) {
          els.readerStatus.classList.remove('visible');
          els.readerStatus.textContent = '';
        }
      }, durationMs);
    }

    /* ─────────── QA Context helpers ─────────── */
    function chapterProgressLabel(chapterIndex, chapterPercent = null) {
      const ch = chapterFromIndex(chapterIndex);
      const name = ch && ch.title ? ch.title : `Chapter ${(chapterIndex || 0) + 1}`;
      if (chapterPercent != null) return `${name} · ${Math.round(chapterPercent)}%`;
      return name;
    }

    function askLocationForEntry(entry) {
      if (!entry) return null;
      return {
        chapter_index: entry.ask_chapter_index != null ? entry.ask_chapter_index : null,
        chapter_percent: entry.ask_chapter_percent != null ? entry.ask_chapter_percent : null,
        book_percent: entry.ask_book_percent != null ? entry.ask_book_percent : null,
        char_offset: entry.ask_char_offset != null ? entry.ask_char_offset : null,
        position_index: entry.position_context != null ? entry.position_context : null,
      };
    }

    function updateQaContext(entry = null) {
      const askLoc = askLocationForEntry(entry);
      if (!askLoc || askLoc.chapter_index == null) {
        els.qaContextText.textContent = 'I know everything up to your current page.';
        els.qaAskLocationLink.classList.add('hidden');
        return;
      }
      const chLabel = chapterProgressLabel(askLoc.chapter_index, askLoc.chapter_percent);
      const bookLabel = askLoc.book_percent != null ? ` · ${Math.round(askLoc.book_percent)}% of book` : '';
      els.qaContextText.textContent = `Asked at: ${chLabel}${bookLabel}`;
      els.qaAskLocationLink.classList.remove('hidden');
    }

    /* ─────────── Text Node Walking ─────────── */
    function buildTextNodeIndex(root) {
      const index = [];
      let charCount = 0;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
      let node;
      while ((node = walker.nextNode())) {
        const len = node.textContent.length;
        index.push({ node, startChar: charCount, endChar: charCount + len });
        charCount += len;
      }
      return index;
    }

    function buildCanonicalMap(root) {
      const index = buildTextNodeIndex(root);
      const map = [];
      let canonicalOffset = 0;
      for (const entry of index) {
        const text = entry.node.textContent;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i].toLowerCase();
          if (/[a-z0-9]/.test(ch)) {
            map.push({ canonicalOffset, node: entry.node, nodeCharOffset: i, charOffset: entry.startChar + i });
            canonicalOffset++;
          }
        }
      }
      return { index, map, totalChars: index.length ? index[index.length - 1].endChar : 0, totalCanonical: canonicalOffset };
    }

    function domPositionFromCharOffset(textNodeIndex, charOffset) {
      for (const entry of textNodeIndex) {
        if (charOffset >= entry.startChar && charOffset < entry.endChar) {
          return { node: entry.node, offset: charOffset - entry.startChar };
        }
      }
      if (textNodeIndex.length) {
        const last = textNodeIndex[textNodeIndex.length - 1];
        return { node: last.node, offset: last.node.textContent.length };
      }
      return null;
    }

    function hintIndexForCharOffset(textNodeIndex, charOffset) {
      const offset = Math.max(0, asNumber(charOffset, 0));
      for (let i = 0; i < textNodeIndex.length; i++) {
        const entry = textNodeIndex[i];
        if (offset < entry.endChar) return i;
      }
      return Math.max(0, textNodeIndex.length - 1);
    }

    function computeCharOffsetFromScroll(container, textNodeIndex, startIndex = 0) {
      const containerTop = container.getBoundingClientRect().top;
      const start = Math.max(0, Math.min(textNodeIndex.length - 1, startIndex | 0));
      const scanFrom = start > 0 ? [start, 0] : [0];
      for (const from of scanFrom) {
        for (let idx = from; idx < textNodeIndex.length; idx++) {
          const entry = textNodeIndex[idx];
          const range = document.createRange();
          range.selectNodeContents(entry.node);
          const rects = range.getClientRects();
          for (const rect of rects) {
            if (rect.bottom > containerTop && rect.height > 0) {
              for (let i = 0; i < entry.node.textContent.length; i++) {
                range.setStart(entry.node, i);
                range.setEnd(entry.node, Math.min(i + 1, entry.node.textContent.length));
                const charRect = range.getBoundingClientRect();
                if (charRect.bottom > containerTop && charRect.height > 0) return entry.startChar + i;
              }
              return entry.startChar;
            }
          }
        }
      }
      return 0;
    }

    function scrollToCharOffset(container, contentEl, textNodeIndex, charOffset, topOffsetPx = 0) {
      const pos = domPositionFromCharOffset(textNodeIndex, charOffset);
      if (!pos) { container.scrollTop = 0; return false; }
      const range = document.createRange();
      range.setStart(pos.node, pos.offset);
      range.setEnd(pos.node, Math.min(pos.offset + 1, pos.node.textContent.length));
      const rect = range.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      const delta = rect.top - containerRect.top;
      container.scrollTop = clampScrollTop(container, container.scrollTop + delta - Math.max(0, topOffsetPx));
      return true;
    }

    function locateApproxCharOffsetForText(contentEl, needle) {
      const target = normalizeText(needle || '');
      if (!contentEl || !target) return null;
      const raw = contentEl.textContent || '';
      if (!raw) return null;
      const lowerRaw = raw.toLowerCase();
      const lowerTarget = target.toLowerCase();
      let idx = lowerRaw.indexOf(lowerTarget);
      if (idx < 0 && lowerTarget.length > 28) idx = lowerRaw.indexOf(lowerTarget.slice(0, 28));
      if (idx < 0) return null;
      return idx;
    }

    /* ─────────── Canonical Highlighting ─────────── */
    function closestHighlightBlock(node, root) {
      let el = node && node.nodeType === Node.ELEMENT_NODE ? node : node && node.parentElement;
      while (el && el !== root) {
        if (el.matches && el.matches('p, h1, h2, h3, h4, h5, h6, li, blockquote, pre, figure, tr')) return el;
        el = el.parentElement;
      }
      return root;
    }

    function highlightCanonicalRange(contentEl, canonicalStart, canonicalEnd) {
      const { map } = buildCanonicalMap(contentEl);
      if (!map.length) return null;
      let startEntry = null, endEntry = null;
      for (const entry of map) {
        if (!startEntry && entry.canonicalOffset >= canonicalStart) startEntry = entry;
        if (entry.canonicalOffset < canonicalEnd) endEntry = entry;
      }
      if (!startEntry || !endEntry) return null;

      const startBlock = closestHighlightBlock(startEntry.node, contentEl);
      const endBlock = closestHighlightBlock(endEntry.node, contentEl);

      try {
        if (startBlock !== endBlock) {
          const allBlocks = Array.from(contentEl.querySelectorAll('p, h1, h2, h3, h4, h5, h6, li, blockquote, pre, figure, tr'));
          const si = allBlocks.indexOf(startBlock), ei = allBlocks.indexOf(endBlock);
          if (si >= 0 && ei >= 0) {
            const from = Math.min(si, ei), to = Math.max(si, ei);
            const targets = allBlocks.slice(from, to + 1);
            targets.forEach(el => el.classList.add('bw-highlight-block'));
            return () => { try { targets.forEach(el => el.classList.remove('bw-highlight-block')); } catch(e){} };
          }
        }

        const range = document.createRange();
        range.setStart(startEntry.node, startEntry.nodeCharOffset);
        range.setEnd(endEntry.node, Math.min(endEntry.nodeCharOffset + 1, endEntry.node.textContent.length));
        const hl = document.createElement('span');
        hl.className = 'bw-highlight';
        hl.style.cssText = 'background: rgba(245, 225, 108, 0.45) !important; border-radius: 2px;';
        if (range.startContainer === range.endContainer) { range.surroundContents(hl); }
        else { const f = range.extractContents(); hl.appendChild(f); range.insertNode(hl); }
        return () => { try { const p = hl.parentNode; if (p) { while (hl.firstChild) p.insertBefore(hl.firstChild, hl); p.removeChild(hl); p.normalize(); } } catch(e){} };
      } catch (e) { console.warn('Failed to highlight', e); return null; }
    }

    function clearCitationHighlights() {
      state.citationHighlightCleanups.forEach(fn => { try { if (typeof fn === 'function') fn(); } catch(e){} });
      state.citationHighlightCleanups = [];
    }

    /* ─────────── Paginator Core ─────────── */
    function snapContainerToLineHeight(container) {
      container.style.height = '';
      container.style.flex = '1';
      const contentEl = container.querySelector('.bw-chapter-content');
      if (!contentEl) return;
      const cs = window.getComputedStyle(contentEl);
      const lh = parseFloat(cs.lineHeight);
      if (!lh || isNaN(lh) || lh <= 0) return;
      const natural = container.clientHeight;
      const lines = Math.floor(natural / lh);
      const snapped = Math.floor(lines * lh);
      if (snapped > 0 && snapped < natural) {
        container.style.height = snapped + 'px';
        container.style.flex = 'none';
      }
    }

    function resetContainerSnap(container) {
      if (!container) return;
      container.style.height = '';
      container.style.flex = '1';
    }

    function storedReaderMode() {
      const raw = state.settings && state.settings.reader_mode;
      return raw === 'scroll' || raw === 'paginated' || raw === 'auto' ? raw : 'auto';
    }

    function isPhoneLikeViewport() {
      const vv = window.visualViewport;
      const width = vv && Number.isFinite(vv.width) ? vv.width : window.innerWidth;
      const height = vv && Number.isFinite(vv.height) ? vv.height : window.innerHeight;
      const shortSide = Math.min(width || 0, height || 0);
      const coarse = window.matchMedia ? window.matchMedia('(pointer: coarse)').matches : false;
      return coarse && shortSide > 0 && shortSide <= 767;
    }

    function resolvedReaderMode() {
      const mode = storedReaderMode();
      return mode === 'auto' ? (isPhoneLikeViewport() ? 'scroll' : 'paginated') : mode;
    }

    function isScrollMode() { return resolvedReaderMode() === 'scroll'; }

    function getReaderContainer() { return els.readerSurface; }
    function getContentElement() { return els.readerSurface.querySelector('.bw-chapter-content'); }

    function clearPageClip(container) {
      if (!container) return;
      container.style.clipPath = '';
      const mask = container.parentElement && container.parentElement.querySelector('.bw-page-mask');
      if (mask) mask.style.display = 'none';
    }

    async function navigateAdjacentChapter(direction) {
      if (!state.readerReady) return false;
      const delta = direction === 'prev' ? -1 : 1;
      const nextChapterIndex = state.currentChapterIndex + delta;
      if (nextChapterIndex < 0 || nextChapterIndex >= state.totalChapters) return false;
      await loadChapter(nextChapterIndex, 0);
      afterPageChange();
      return true;
    }

    function syncScrollChapterNav() {
      const container = getReaderContainer();
      if (!container) return;
      const existing = container.querySelector('.bw-scroll-chapter-nav');
      if (!isScrollMode()) {
        if (existing) existing.remove();
        return;
      }
      const hasPrev = state.currentChapterIndex > 0;
      const hasNext = state.currentChapterIndex < state.totalChapters - 1;
      let nav = existing;
      if (!nav) {
        nav = document.createElement('div');
        nav.className = 'bw-scroll-chapter-nav';
        container.appendChild(nav);
      }
      nav.innerHTML = '';
      if (!hasPrev && !hasNext) {
        nav.remove();
        return;
      }
      if (hasPrev) {
        const prevBtn = document.createElement('button');
        prevBtn.className = 'nav-btn';
        prevBtn.type = 'button';
        prevBtn.textContent = 'Prev chapter';
        prevBtn.addEventListener('click', () => { navigateAdjacentChapter('prev').catch(() => {}); });
        nav.appendChild(prevBtn);
      }
      if (hasNext) {
        const nextBtn = document.createElement('button');
        nextBtn.className = 'nav-btn';
        nextBtn.type = 'button';
        nextBtn.textContent = 'Next chapter';
        nextBtn.addEventListener('click', () => { navigateAdjacentChapter('next').catch(() => {}); });
        nav.appendChild(nextBtn);
      }
    }

    function configureReaderMode() {
      const mode = resolvedReaderMode();
      state.activeReaderMode = mode;
      els.readerView.dataset.activeReaderMode = mode;
      const container = getReaderContainer();
      if (container) {
        if (mode === 'scroll') resetContainerSnap(container);
        container.style.overflow = mode === 'scroll' ? 'auto' : 'hidden';
        container.style.overflowX = 'hidden';
        container.style.overflowY = mode === 'scroll' ? 'auto' : 'hidden';
        container.style.position = 'relative';
        if (mode === 'scroll') clearPageClip(container);
      }
      const paginatedReady = state.readerReady && mode === 'paginated';
      const scrollReady = state.readerReady && mode === 'scroll';
      els.turnLeft.classList.toggle('disabled', !paginatedReady);
      els.turnRight.classList.toggle('disabled', !paginatedReady);
      els.prevPageBtn.textContent = scrollReady ? 'Prev chapter' : 'Prev';
      els.nextPageBtn.textContent = scrollReady ? 'Next chapter' : 'Next';
      els.prevPageBtn.title = scrollReady ? 'Previous chapter' : 'Previous page';
      els.nextPageBtn.title = scrollReady ? 'Next chapter' : 'Next page';
      if (scrollReady) {
        els.prevPageBtn.disabled = state.currentChapterIndex <= 0;
        els.nextPageBtn.disabled = state.currentChapterIndex >= state.totalChapters - 1;
      } else {
        els.prevPageBtn.disabled = !paginatedReady;
        els.nextPageBtn.disabled = !paginatedReady;
      }
      syncScrollChapterNav();
      return mode;
    }

    function quantizePx(value) {
      const dpr = window.devicePixelRatio || 1;
      return Math.round(Number(value || 0) * dpr) / dpr;
    }

    function clampScrollTop(container, scrollTop) {
      const max = Math.max(0, quantizePx(container.scrollHeight - container.clientHeight));
      return Math.min(max, Math.max(0, quantizePx(scrollTop)));
    }

    function totalCharsForTextIndex(textNodeIndex) {
      return textNodeIndex.length ? textNodeIndex[textNodeIndex.length - 1].endChar : 1;
    }

    function containerMetrics(container) {
      const viewport = Math.max(0, quantizePx(container.clientHeight));
      const scrollHeight = Math.max(0, quantizePx(container.scrollHeight));
      const maxScrollTop = Math.max(0, quantizePx(scrollHeight - viewport));
      const scrollTop = clampScrollTop(container, container.scrollTop);
      return { viewport, scrollHeight, maxScrollTop, scrollTop };
    }

    /* ─── Precomputed Page Boundaries ─── */
    let _pageBreaks = [];  // sorted array of scrollTop values, one per page
    let _pageBreaksKey = null;
    let _pageClipHeights = [];
    let _pageStartNodes = [];
    let _currentPageIndex = 0;

    function invalidatePageBreakCache() {
      _pageBreaks = [];
      _pageClipHeights = [];
      _pageStartNodes = [];
      _pageBreaksKey = null;
    }

    function collectLineMetrics(contentEl) {
      const contentRect = contentEl.getBoundingClientRect();
      const textNodeIndex = buildTextNodeIndex(contentEl);
      const lineMap = new Map();
      for (const entry of textNodeIndex) {
        if (!(entry.node.textContent || '').trim()) continue;
        const rng = document.createRange();
        rng.selectNodeContents(entry.node);
        for (const rect of rng.getClientRects()) {
          if (rect.height <= 0) continue;
          const top = quantizePx(rect.top - contentRect.top);
          const bottom = quantizePx(rect.bottom - contentRect.top);
          const key = `${top}:${bottom}`;
          if (!lineMap.has(key)) lineMap.set(key, { top, bottom, node: entry.node });
        }
      }
      return Array.from(lineMap.values()).sort((a, b) => a.top - b.top || a.bottom - b.bottom);
    }

    function buildPageBreaks(container) {
      const contentEl = getContentElement();
      if (!contentEl) return [0];
      const spacer = getPageSpacer(container, true);
      const cacheKey = `${contentEl.scrollHeight}:${contentEl.clientWidth}:${container.clientHeight}`;
      if (_pageBreaksKey === cacheKey) return _pageBreaks;

      const viewport = Math.max(0, quantizePx(container.clientHeight));
      if (viewport <= 0) {
        _pageBreaks = [0];
        _pageClipHeights = [0];
        _pageStartNodes = [null];
        _pageBreaksKey = cacheKey;
        return _pageBreaks;
      }

      const currentSpacerHeight = Math.max(0, quantizePx(spacer ? spacer.offsetHeight : 0));
      const baseScrollHeight = Math.max(
        viewport,
        quantizePx(contentEl.scrollHeight),
        quantizePx(container.scrollHeight - currentSpacerHeight),
      );
      const lines = collectLineMetrics(contentEl);
      const breaks = [0];
      const clipHeights = [];
      const startNodes = [];
      let pageStart = 0;
      let lineIndex = 0;

      while (true) {
        while (lineIndex < lines.length && lines[lineIndex].bottom <= pageStart + 0.5) lineIndex++;
        startNodes.push(lineIndex < lines.length ? lines[lineIndex].node : null);
        const pageBottom = pageStart + viewport;
        let overflowIndex = lineIndex;
        while (overflowIndex < lines.length && lines[overflowIndex].bottom <= pageBottom + 0.5) overflowIndex++;
        const lastFullBottom = overflowIndex > lineIndex ? lines[overflowIndex - 1].bottom : pageStart;
        clipHeights.push(Math.max(0, Math.ceil(pageBottom - lastFullBottom)));
        if (overflowIndex >= lines.length) break;
        const nextStart = Math.max(pageStart + 1, Math.round(lines[overflowIndex].top));
        breaks.push(nextStart);
        pageStart = nextStart;
        lineIndex = overflowIndex;
      }

      const requiredMaxScroll = breaks.length ? breaks[breaks.length - 1] : 0;
      const currentMaxScroll = Math.max(0, quantizePx(baseScrollHeight - viewport));
      const requiredSpacerHeight = Math.max(0, Math.ceil(requiredMaxScroll - currentMaxScroll));
      if (spacer && Math.abs(requiredSpacerHeight - currentSpacerHeight) > 0.5) {
        spacer.style.height = `${requiredSpacerHeight}px`;
      }

      _pageBreaks = breaks;
      _pageClipHeights = clipHeights;
      _pageStartNodes = startNodes;
      _pageBreaksKey = cacheKey;
      return breaks;
    }

    function findPageIndex(breaks, scrollTop) {
      // Binary search for the page containing this scrollTop
      let lo = 0, hi = breaks.length - 1;
      while (lo < hi) {
        const mid = (lo + hi + 1) >> 1;
        if (breaks[mid] <= scrollTop + 1) lo = mid;
        else hi = mid - 1;
      }
      return lo;
    }

    function getPageSpacer(container, create = false) {
      let spacer = container.querySelector('.bw-page-spacer');
      if (!spacer && create) {
        spacer = document.createElement('div');
        spacer.className = 'bw-page-spacer';
        spacer.style.cssText = 'width:100%;height:0;pointer-events:none;';
        container.appendChild(spacer);
      }
      return spacer;
    }

    function updateReadingStateFromCharOffset(charOffset, totalChars, options = {}) {
      const safeTotalChars = Math.max(1, asNumber(totalChars, 1));
      const chapterPercent = (charOffset / safeTotalChars) * 100;
      const bookPercent = state.totalChapters > 0 ? ((state.currentChapterIndex + chapterPercent / 100) / state.totalChapters) * 100 : 0;
      state.currentCharOffset = charOffset;
      state.currentPage = options.pageIndex != null ? options.pageIndex : 0;
      state.totalPages = options.totalPages != null ? options.totalPages : 1;
      state.currentPosition = {
        ...(state.currentPosition || {}),
        chapter_index: state.currentChapterIndex,
        chapter_percent: chapterPercent,
        book_percent: bookPercent,
        char_offset: charOffset,
      };
      if (options.diag) readerDiag(options.diag, options.diagData || {});
      updateReaderProgressText();
      if (options.queue !== false) {
        queuePositionUpdate({
          chapter_index: state.currentChapterIndex,
          chapter_percent: chapterPercent,
          book_percent: bookPercent,
          char_offset: charOffset,
        });
      }
      if (options.scheduleReturnDismiss !== false) scheduleReturnDismiss();
    }

    function viewportReadingState(container, contentEl, hintIndex = 0, textNodeIndex = null) {
      const index = textNodeIndex || buildTextNodeIndex(contentEl);
      return {
        textNodeIndex: index,
        charOffset: computeCharOffsetFromScroll(container, index, hintIndex),
        totalChars: totalCharsForTextIndex(index),
      };
    }


    function applyPageClip(container) {
      clearPageClip(container);
      let mask = container.parentElement.querySelector('.bw-page-mask');
      const breaks = buildPageBreaks(container);
      const i = _currentPageIndex;
      if (i >= breaks.length - 1) {
        if (mask) mask.style.display = 'none';
        return;
      }
      const crect = container.getBoundingClientRect();
      const coverHeight = _pageClipHeights[i] || 0;
      if (coverHeight > 0.5) {
        if (!mask) {
          mask = document.createElement('div');
          mask.className = 'bw-page-mask';
          mask.style.cssText = 'position:absolute;left:0;right:0;pointer-events:none;z-index:10;';
          container.parentElement.style.position = 'relative';
          container.parentElement.appendChild(mask);
        }
        // Position the mask at the bottom of the container
        const parentRect = container.parentElement.getBoundingClientRect();
        mask.style.bottom = (parentRect.bottom - crect.bottom) + 'px';
        mask.style.height = coverHeight + 'px';
        mask.style.display = 'block';
        // Match the background color
        // Walk up to find a non-transparent background
        let bg = 'rgb(26, 26, 46)'; // fallback
        let el = container;
        while (el) {
          const c = window.getComputedStyle(el).backgroundColor;
          if (c && c !== 'rgba(0, 0, 0, 0)' && c !== 'transparent') { bg = c; break; }
          el = el.parentElement;
        }
        mask.style.backgroundColor = bg;
      } else {
        if (mask) mask.style.display = 'none';
      }
    }

    function pageForward() {
      const c = getReaderContainer(); if (!c) return false;
      const breaks = buildPageBreaks(c);
      if (_currentPageIndex >= breaks.length - 1) return false;
      _currentPageIndex += 1;
      c.scrollTop = breaks[_currentPageIndex];
      readerDiag('page:next', { pageIndex: _currentPageIndex, scrollTop: c.scrollTop, totalPages: breaks.length });
      return true;
    }

    function pageBackward() {
      const c = getReaderContainer(); if (!c) return false;
      const breaks = buildPageBreaks(c);
      if (_currentPageIndex <= 0) { c.scrollTop = 0; return false; }
      _currentPageIndex -= 1;
      c.scrollTop = breaks[_currentPageIndex];
      readerDiag('page:prev', { pageIndex: _currentPageIndex, scrollTop: c.scrollTop, totalPages: breaks.length });
      return true;
    }

    function syncScrollPosition(options = {}) {
      if (!state.readerReady) return;
      const container = getReaderContainer(), contentEl = getContentElement();
      if (!container || !contentEl) return;
      clearPageClip(container);
      const textNodeIndex = buildTextNodeIndex(contentEl);
      const { charOffset, totalChars } = viewportReadingState(container, contentEl, hintIndexForCharOffset(textNodeIndex, state.currentCharOffset), textNodeIndex);
      updateReadingStateFromCharOffset(charOffset, totalChars, options);
    }

    function scheduleReaderScrollSync(delayMs = 80) {
      clearTimeout(state.readerScrollTimer);
      state.readerScrollTimer = setTimeout(() => {
        state.readerScrollTimer = null;
        if (state.readerReady && isScrollMode()) syncScrollPosition();
      }, delayMs);
    }

    async function turnPage(direction) {
      if (!state.readerReady) return;
      if (isScrollMode()) {
        await navigateAdjacentChapter(direction);
        return;
      }
      if (direction === 'next') {
        if (!pageForward() && state.currentChapterIndex < state.totalChapters - 1) await loadChapter(state.currentChapterIndex + 1, 0);
      } else {
        if (!pageBackward() && state.currentChapterIndex > 0) await loadChapter(state.currentChapterIndex - 1, Infinity);
      }
      afterPageChange();
    }

    function afterPageChange(options = {}) {
      if (!state.readerReady) return;
      if (isScrollMode()) {
        syncScrollPosition(options);
        return;
      }
      const container = getReaderContainer(), contentEl = getContentElement();
      if (!container || !contentEl) return;
      // Sync page index from scroll position (for external jumps)
      const breaks = buildPageBreaks(container);
      _currentPageIndex = findPageIndex(breaks, container.scrollTop);
      const textNodeIndex = buildTextNodeIndex(contentEl);
      let hintIndex = 0;
      const startNode = _pageStartNodes[_currentPageIndex];
      if (startNode) {
        const foundIndex = textNodeIndex.findIndex(entry => entry.node === startNode);
        if (foundIndex >= 0) hintIndex = Math.max(0, foundIndex - 1);
      }
      const { charOffset, totalChars } = viewportReadingState(container, contentEl, hintIndex, textNodeIndex);
      applyPageClip(container);
      updateReadingStateFromCharOffset(charOffset, totalChars, {
        ...options,
        pageIndex: _currentPageIndex,
        totalPages: breaks.length,
        diag: 'page:state',
        diagData: { pageIndex: _currentPageIndex, targetScrollTop: null, snappedScrollTop: container.scrollTop, metrics: containerMetrics(container) },
      });
    }

    /* ─────────── Chapter Loading ─────────── */
    async function extractChapterHtml(chapterIndex) {
      if (state.chapterHtmlCache[chapterIndex]) return state.chapterHtmlCache[chapterIndex];
      const book = state.ebook;
      if (!book || !book.spine) throw new Error('Book not loaded');
      const spineItem = book.spine.get(chapterIndex);
      if (!spineItem) throw new Error(`Spine item ${chapterIndex} not found`);
      await spineItem.load(book.load.bind(book));
      let html = '';
      if (spineItem.document) {
        const doc = spineItem.document;
        html = doc.body ? doc.body.innerHTML : '';
      } else if (spineItem.contents) {
        html = spineItem.contents.innerHTML || '';
      } else if (spineItem.output) {
        html = spineItem.output;
      }
      const result = { html, href: spineItem.href };
      state.chapterHtmlCache[chapterIndex] = result;
      return result;
    }

    async function resolveImageUrls(contentEl, book) {
      for (const img of contentEl.querySelectorAll('img')) {
        const src = img.getAttribute('src');
        if (!src || src.startsWith('blob:') || src.startsWith('data:')) continue;
        try { const url = await book.archive.createUrl(src); if (url) img.src = url; }
        catch (e) { try { const url = await book.archive.createUrl(new URL(src, book.url || '').href); if (url) img.src = url; } catch(e2){} }
      }
    }

    function buildChapterStyles() {
      const bp = clamp(asNumber(state.settings && state.settings.reader_bottom_padding_px, 34), readerBottomPaddingBounds().min, readerBottomPaddingBounds().max);
      const fs = asNumber(state.settings && state.settings.reader_font_size, 100);
      const spread = (state.settings && state.settings.reader_spread) === 'double' ? 'double' : 'single';
      const contentMaxWidth = spread === 'double' ? 1180 : 760;
      return `.bw-chapter-content{color:#e8e0d4;background:#2e2a27;font-family:Georgia,serif;font-size:${fs}%;line-height:1.65;padding:10px 24px ${bp}px;box-sizing:border-box;min-height:100%;max-width:${contentMaxWidth}px;margin:0 auto}.bw-chapter-content *{color:#e8e0d4!important;background-color:transparent!important}.bw-chapter-content h1,.bw-chapter-content h2,.bw-chapter-content h3{color:#f0e8da!important}.bw-chapter-content a{color:#e3be79!important}.bw-chapter-content img{max-width:100%;height:auto}.bw-highlight{background:rgba(245,225,108,0.45)!important;border-radius:2px}.bw-highlight-block{background:rgba(245,225,108,0.38)!important;box-shadow:inset 0 0 0 1px rgba(245,225,108,0.55);border-radius:4px}`;
    }

    async function loadChapter(chapterIndex, charOffset = 0) {
      const container = getReaderContainer(); if (!container) return;
      clearCitationHighlights();
      const chapterData = await extractChapterHtml(chapterIndex);
      state.currentChapterIndex = chapterIndex;
      container.innerHTML = '';
      const style = document.createElement('style'); style.textContent = buildChapterStyles(); container.appendChild(style);
      const content = document.createElement('div'); content.className = 'bw-chapter-content'; content.innerHTML = chapterData.html; container.appendChild(content);
      if (state.ebook) await resolveImageUrls(content, state.ebook);
      const imgs = content.querySelectorAll('img');
      if (imgs.length) await Promise.all(Array.from(imgs).map(img => img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })));
      const tni = buildTextNodeIndex(content);
      applyReaderSpread((state.settings && state.settings.reader_spread) || 'single');
      configureReaderMode();
      if (!isScrollMode()) snapContainerToLineHeight(container);
      if (charOffset === Infinity) { container.scrollTop = clampScrollTop(container, container.scrollHeight); }
      else if (charOffset > 0) { scrollToCharOffset(container, content, tni, charOffset, 10); }
      else { container.scrollTop = 0; }
      state.currentCharOffset = charOffset === Infinity ? (tni.length ? tni[tni.length-1].endChar : 0) : charOffset;
      container.scrollTop = clampScrollTop(container, container.scrollTop);
      invalidatePageBreakCache();
      clearPageClip(container);
      if (isScrollMode()) {
        state.currentPage = 0;
        state.totalPages = 1;
      } else {
        const breaks = buildPageBreaks(container);
        _currentPageIndex = findPageIndex(breaks, container.scrollTop);
        container.scrollTop = breaks[_currentPageIndex] || 0;
        state.currentPage = _currentPageIndex;
        state.totalPages = breaks.length;
        applyPageClip(container);
      }
      syncScrollChapterNav();
      interceptInternalLinks(content, chapterData.href);
    }

    /* ─────────── Internal Link Interception ─────────── */
    function interceptInternalLinks(contentEl, chapterHref) {
      contentEl.addEventListener('click', async (e) => {
        const link = closestFromEvent(e, 'a[href]');
        if (!link) return;
        const href = link.getAttribute('href');
        if (!href || href.startsWith('http://') || href.startsWith('https://') || href.startsWith('mailto:')) return;
        e.preventDefault();
        e.stopPropagation();
        pushReturnPosition();
        // Same-chapter fragment: #id
        if (href.startsWith('#')) {
          const targetEl = contentEl.querySelector(href) || contentEl.querySelector('[id="' + CSS.escape(href.slice(1)) + '"]');
          if (targetEl) {
            const container = getReaderContainer();
            targetEl.scrollIntoView({ block: 'start' });
            // Highlight the target element briefly
            targetEl.style.transition = 'background 300ms ease';
            targetEl.style.background = 'rgba(245,225,108,0.45)';
            state.citationHighlightCleanups.push(() => { targetEl.style.background = ''; });
            afterPageChange();
          }
          return;
        }
        // Cross-chapter link: possibly "chapter.xhtml#fragment" or just "chapter.xhtml"
        const [linkFile, fragment] = href.split('#');
        const resolvedHref = linkFile ? new URL(linkFile, 'http://x/' + (chapterHref || '')).pathname.replace(/^\//, '') : '';
        const targetChapter = state.chapters.find(ch => {
          const h = (ch.spine_href || '').split('#')[0];
          return h && resolvedHref && (h.endsWith(resolvedHref) || resolvedHref.endsWith(h) || h === resolvedHref);
        });
        if (targetChapter) {
          await loadChapter(targetChapter.chapter_index, 0);
          if (fragment) {
            const newContent = getContentElement();
            if (newContent) {
              const targetEl = newContent.querySelector('#' + CSS.escape(fragment));
              if (targetEl) {
                targetEl.scrollIntoView({ block: 'start' });
                targetEl.style.transition = 'background 300ms ease';
                targetEl.style.background = 'rgba(245,225,108,0.45)';
                state.citationHighlightCleanups.push(() => { targetEl.style.background = ''; });
              }
            }
          }
          afterPageChange();
        } else {
          showReaderStatusMessage('Link target not found in this book.');
        }
      });
    }

    /* ─────────── Reflow Recovery ─────────── */
    function handleReflow() {
      if (!state.readerReady) return;
      const container = getReaderContainer(), contentEl = getContentElement();
      if (!container || !contentEl) return;
      configureReaderMode();
      if (isScrollMode()) syncScrollPosition({ queue: false, scheduleReturnDismiss: false });
      invalidatePageBreakCache();
      const before = containerMetrics(container);
      if (!isScrollMode()) snapContainerToLineHeight(container);
      scrollToCharOffset(container, contentEl, buildTextNodeIndex(contentEl), state.currentCharOffset);
      container.scrollTop = clampScrollTop(container, container.scrollTop);
      const after = containerMetrics(container);
      if (isScrollMode()) {
        clearPageClip(container);
        readerDiag('reflow:restore', { mode: 'scroll', targetScrollTop: before.scrollTop, snappedScrollTop: after.scrollTop, metrics: after });
        afterPageChange({ queue: false, scheduleReturnDismiss: false });
        return;
      }
      const breaks = buildPageBreaks(container);
      _currentPageIndex = findPageIndex(breaks, container.scrollTop);
      container.scrollTop = breaks[_currentPageIndex] || 0;
      readerDiag('reflow:restore', { mode: 'paginated', pageIndex: _currentPageIndex, targetScrollTop: before.scrollTop, snappedScrollTop: after.scrollTop, metrics: after });
      state.currentPage = _currentPageIndex;
      state.totalPages = breaks.length;
      afterPageChange({ queue: false, scheduleReturnDismiss: false });
    }
    let reflowTimer = null;
    function scheduleReflow() { clearTimeout(reflowTimer); reflowTimer = setTimeout(handleReflow, 100); }

    /* ─────────── Controls ─────────── */
    function setControlsCollapsed(collapsed) {
      state.controlsCollapsed = collapsed;
      els.readerView.classList.toggle('controls-collapsed', collapsed);
      els.readerControlsToggle.textContent = collapsed ? '▾' : '▴';
      els.readerControlsToggle.title = collapsed ? 'Expand controls' : 'Collapse controls';
      scheduleControlsMetricsSync();
    }
    function closeReaderPanels() { els.tocPanel.classList.remove('open'); els.bookmarksPanel.classList.remove('open'); }
    function toggleReaderPanel(kind) {
      if (kind === 'toc') { els.bookmarksPanel.classList.remove('open'); els.tocPanel.classList.toggle('open'); }
      else if (kind === 'bookmarks') { els.tocPanel.classList.remove('open'); els.bookmarksPanel.classList.toggle('open'); }
    }

    /* ─────────── Search ─────────── */
    function updateReaderSearchStatus(message = null) {
      if (message != null) { els.readerSearchStatus.textContent = message; return; }
      const t = state.searchMatches.length;
      els.readerSearchStatus.textContent = !t ? '0 matches' : `${state.searchMatchIndex + 1} of ${t}`;
    }
    function resetReaderSearch(clearInput = false) {
      state.searchQuery = ''; state.searchMatches = []; state.searchMatchIndex = -1; state.searchReturnCaptured = false;
      if (clearInput) els.readerSearchInput.value = '';
      updateReaderSearchStatus('');
    }

    async function jumpToSearchMatch(index) {
      const total = state.searchMatches.length; if (!total) return;
      const nextIndex = ((index % total) + total) % total;
      state.searchMatchIndex = nextIndex; updateReaderSearchStatus();
      const match = state.searchMatches[nextIndex]; if (!match) return;
      if (!state.searchReturnCaptured) pushReturnPosition();
      try {
        state.suppressReturnDismissUntil = Date.now() + 1500;
        clearCitationHighlights();
        const ci = asNumber(match.chapter_index, 0), cs = asNumber(match.match_canonical_start, 0), ce = asNumber(match.match_canonical_end, cs + 1);
        if (ci !== state.currentChapterIndex) await loadChapter(ci, 0);
        const contentEl = getContentElement();
        if (contentEl) {
          const { map } = buildCanonicalMap(contentEl);
          const se = map.find(e => e.canonicalOffset >= cs);
          if (se) { scrollToCharOffset(getReaderContainer(), contentEl, buildTextNodeIndex(contentEl), se.charOffset); afterPageChange(); }
          const cleanup = highlightCanonicalRange(contentEl, cs, ce);
          if (cleanup) state.citationHighlightCleanups.push(cleanup);
        }
      } catch (err) { console.error('Search jump failed', err); showReaderStatusMessage('Failed to navigate to search match.'); }
      state.searchReturnCaptured = true;
    }

    async function runReaderSearch() {
      if (!state.currentBookId) return;
      const query = normalizeText(els.readerSearchInput.value || '');
      if (query.length < 2) { state.searchQuery = query; state.searchMatches = []; state.searchMatchIndex = -1; state.searchReturnCaptured = false; updateReaderSearchStatus('Type 2+ chars'); return; }
      updateReaderSearchStatus('Searching…');
      const data = await fetchJson(`/api/books/${state.currentBookId}/search?q=${encodeURIComponent(query)}&limit=200`);
      state.searchQuery = query; state.searchMatches = Array.isArray(data.matches) ? data.matches : []; state.searchMatchIndex = -1; state.searchReturnCaptured = false;
      if (!state.searchMatches.length) { clearCitationHighlights(); updateReaderSearchStatus('0 matches'); return; }
      await jumpToSearchMatch(0); updateReaderSearchStatus();
    }

    async function cycleReaderSearchMatch(delta) { if (!state.searchMatches.length) return; await jumpToSearchMatch(state.searchMatchIndex + delta); updateReaderSearchStatus(); }

    /* ─────────── Return Stack ─────────── */
    function currentPositionLabel() { return state.currentPosition ? chapterProgressLabel(state.currentPosition.chapter_index, state.currentPosition.chapter_percent) : ''; }
    function updateReturnControls() { els.returnControls.classList.toggle('open', state.returnStack.length > 0); }
    function clearReturnStack() { state.returnStack = []; clearTimeout(state.returnDismissTimer); updateReturnControls(); }
    function pushReturnPosition() {
      if (!state.readerReady) return;
      state.returnStack.push({ chapterIndex: state.currentChapterIndex, charOffset: state.currentCharOffset, label: currentPositionLabel() });
      updateReturnControls();
    }
    function scheduleReturnDismiss() {
      clearTimeout(state.returnDismissTimer);
      if (!state.returnStack.length || Date.now() < state.suppressReturnDismissUntil) return;
      state.returnDismissTimer = setTimeout(clearReturnStack, 15000);
    }
    async function returnToReading() {
      if (!state.returnStack.length || !state.readerReady) return;
      const target = state.returnStack.pop(); updateReturnControls(); if (!target) return;
      try { clearCitationHighlights(); state.suppressReturnDismissUntil = Date.now() + 1500; await loadChapter(target.chapterIndex, target.charOffset); afterPageChange(); }
      catch (err) { console.error('Failed to return to saved position', err); }
    }

    /* ─────────── Source Jump ─────────── */
    function sourceTextForMatching(source) { return normalizeText(source.anchor_text || source.snippet || ''); }

    async function jumpToSource(source, citationContext = null, options = null) {
      if (!source) return;
      if ((source.source_type || '') === 'wiki' || source.wiki_source_id != null) {
        if (source.viewer_url) window.open(source.viewer_url, '_blank', 'noopener');
        else showReaderStatusMessage('Wiki citation link is unavailable.');
        return;
      }
      if (!state.readerReady) return;
      const opts = options || {};
      clearCitationHighlights();
      const ci = asNumber(source.chapter_index, null), cs = asNumber(source.canonical_start, null), ce = asNumber(source.canonical_end, null);
      if (ci == null) { showReaderStatusMessage('Citation location unavailable for this chunk.'); return; }
      if (opts.pushReturn !== false) pushReturnPosition();
      if (opts.closeQa !== false) closeQaPanel();
      try {
        state.suppressReturnDismissUntil = Date.now() + 1500;
        if (ci !== state.currentChapterIndex) await loadChapter(ci, 0);
        const contentEl = getContentElement(); if (!contentEl) return;
        if (cs != null) {
          const { map } = buildCanonicalMap(contentEl);
          const se = map.find(e => e.canonicalOffset >= cs);
          if (se) { scrollToCharOffset(getReaderContainer(), contentEl, buildTextNodeIndex(contentEl), se.charOffset); afterPageChange(); }
          if (ce != null) { const cleanup = highlightCanonicalRange(contentEl, cs, ce); if (cleanup) state.citationHighlightCleanups.push(cleanup); }
        }
      } catch (err) { console.error('Failed to jump to citation source', err); }
    }

    /* ─────────── Bookmarks ─────────── */
    function formatBookmarkLabel(bm) {
      const label = bm.label || bm.anchor_text || '';
      const ch = bm.chapter_index != null ? `Ch ${bm.chapter_index + 1}` : '';
      return label ? `${ch}: ${label}` : ch || 'Bookmark';
    }

    function renderBookmarks() {
      els.bookmarksList.innerHTML = '';
      if (!state.bookmarks.length) { const e = document.createElement('div'); e.className = 'msg-state'; e.style.padding = '14px'; e.textContent = 'No bookmarks yet.'; els.bookmarksList.appendChild(e); return; }
      state.bookmarks.forEach(bm => {
        const item = document.createElement('div');
        item.style.cssText = 'padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;';
        const info = document.createElement('div'); info.style.cssText = 'flex:1;overflow:hidden;';
        const t = document.createElement('div'); t.style.cssText = 'font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'; t.textContent = formatBookmarkLabel(bm);
        const time = document.createElement('div'); time.style.cssText = 'font-size:12px;color:var(--text-muted);'; time.textContent = relativeTime(bm.created_at);
        info.append(t, time);
        const del = document.createElement('button'); del.className = 'btn-icon'; del.textContent = '×'; del.title = 'Delete'; del.style.cssText = 'flex-shrink:0;margin-left:8px;';
        del.addEventListener('click', async e => { e.stopPropagation(); try { await fetchJson(`/api/books/${state.currentBookId}/bookmarks/${bm.id}`, { method: 'DELETE' }); await loadBookmarks(); } catch(err){} });
        item.append(info, del);
        item.addEventListener('click', () => openBookmark(bm));
        els.bookmarksList.appendChild(item);
      });
    }

    async function openBookmark(bm) {
      if (!state.readerReady) return;
      pushReturnPosition();
      const ci = asNumber(bm.chapter_index, 0), co = asNumber(bm.char_offset, null), ao = asNumber(bm.anchor_canonical_offset, null);
      if (co != null) { await loadChapter(ci, co); afterPageChange(); return; }
      if (ao != null) {
        await loadChapter(ci, 0);
        const contentEl = getContentElement();
        if (contentEl) { const { map } = buildCanonicalMap(contentEl); const e = map.find(x => x.canonicalOffset >= ao); if (e) { scrollToCharOffset(getReaderContainer(), contentEl, buildTextNodeIndex(contentEl), e.charOffset); afterPageChange(); return; } }
      }
      await loadChapter(ci, 0); afterPageChange();
    }

    async function loadBookmarks() {
      if (!state.currentBookId) return;
      try { const data = await fetchJson(`/api/books/${state.currentBookId}/bookmarks`); state.bookmarks = data.bookmarks || []; renderBookmarks(); updateBookmarkToggleState(); }
      catch (err) { console.error('Failed to load bookmarks', err); }
    }

    function updateBookmarkToggleState() {
      const btn = els.bookmarkToggleBtn; if (!btn) return;
      const isBookmarked = state.bookmarks.some(bm => bm.chapter_index === state.currentChapterIndex && bm.char_offset != null && Math.abs(bm.char_offset - state.currentCharOffset) < 50);
      btn.textContent = isBookmarked ? '★' : '☆';
      btn.title = isBookmarked ? 'Remove bookmark' : 'Add bookmark';
      btn.disabled = false;
    }

    async function toggleCurrentBookmark() {
      if (!state.readerReady || !state.currentBookId) return;
      const contentEl = getContentElement();
      let anchorText = '';
      if (contentEl) { const tni = buildTextNodeIndex(contentEl); const pos = domPositionFromCharOffset(tni, state.currentCharOffset); if (pos && pos.node) anchorText = (pos.node.textContent || '').trim().slice(0, 120); }
      try {
        const res = await fetchJson(`/api/books/${state.currentBookId}/bookmarks/toggle`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chapter_index: state.currentChapterIndex, char_offset: state.currentCharOffset, chapter_percent: state.currentPosition ? state.currentPosition.chapter_percent : 0, book_percent: state.currentPosition ? state.currentPosition.book_percent : 0, anchor_text: anchorText || null }) });
        await loadBookmarks();
        showReaderStatusMessage(res.bookmarked ? 'Bookmark added' : 'Bookmark removed', 1200);
      } catch (err) { console.error('Failed to toggle bookmark', err); showReaderStatusMessage('Failed to save bookmark'); }
    }

    function normalizedVirtualChapterState(raw) {

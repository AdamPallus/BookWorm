        detection_mode: raw && String(raw.detection_mode || "").toLowerCase() === "plain" ? "plain" : "strict",
        toc_display_mode: raw && String(raw.toc_display_mode || "").toLowerCase() === 'separate' ? 'separate' : 'merged',

    function virtualChapterDisplayLabel(entry, idx) {

      return `✨ ${base}`;
    }

    function updateVirtualChapterControls() {
      const hasBook = !!state.currentBookId;
      const hasEntries = !!(state.virtualChapters && state.virtualChapters.entries && state.virtualChapters.entries.length);
      const enabled = !!(state.virtualChapters && state.virtualChapters.enabled && hasEntries);
      const detectionMode = state.virtualChapters && state.virtualChapters.detection_mode === 'plain' ? 'plain' : 'strict';
      const tocDisplayMode = state.virtualChapters && state.virtualChapters.toc_display_mode === 'separate' ? 'separate' : 'merged';
      els.detectChaptersBtn.disabled = !hasBook;
      els.virtualChaptersToggleBtn.textContent = enabled ? 'Virtual TOC: On' : 'Virtual TOC: Off';
      els.virtualChaptersToggleBtn.disabled = !hasBook || !hasEntries;
      els.virtualChaptersToggleBtn.title = hasBook ? (hasEntries ? 'Enable or disable virtual chapters for this book' : 'Run Detect chapters first') : 'Open a book first';
      els.clearVirtualChaptersBtn.disabled = !hasBook || !hasEntries;

    async function detectVirtualChaptersPrompt() {

      const next = current === 'merged' ? 'separate' : 'merged';

    async function clearVirtualChapters() {
      if (!state.currentBookId || !state.virtualChapters.entries.length) return;

    /* ─────────── TOC ─────────── */
    function chapterFromIndex(index) { if (!state.chapters.length || index == null) return null; return state.chapters.find(ch => ch.chapter_index === index) || null; }
    function chapterLabel(chapter) { if (!chapter) return 'Unknown'; return chapter.title || `Chapter ${(chapter.chapter_index || 0) + 1}`; }

    function normalizeHrefForCompare(href) {
      const raw = String(href || '').split('#')[0].trim();
      if (!raw) return '';
      const strip = raw.replace(/^\.\//, '').replace(/^\//, '');
      try {
        return decodeURIComponent(strip).toLowerCase();
      } catch (_) {
        return strip.toLowerCase();
      }
    }

    function resolveChapterFromHref(href) {
      const normalizedHref = normalizeHrefForCompare(href);
      if (!normalizedHref) return null;
      return state.chapters.find(ch => {
        const h = normalizeHrefForCompare(ch.spine_href || '');
        return h && (h.endsWith(normalizedHref) || normalizedHref.endsWith(h) || h === normalizedHref);

    async function jumpToTocHref(href) {

    function isServerPositionMeaningfullyAhead(localPos, serverPos) {

      if (serverChapter > localChapter) return true;
      if (serverChapter < localChapter) return false;

      if (serverPercent - localPercent >= 1.5) return true;

      const localOffset = Number(localPos.char_offset);

    /* ─────────── Citation HTML ─────────── */
    function renderAnswerHtmlWithCitations(answer, sources) {
      const ss = Array.isArray(sources) ? sources : [];
      const raw = String(answer || '');
      const chunkMap = new Map();
      const wikiMap = new Map();
      ss.forEach((s, i) => {
        if (s && s.chunk_id != null) chunkMap.set(String(s.chunk_id), i);
        if (s && s.wiki_source_id != null) wikiMap.set(String(s.wiki_source_id), i);
      });
      const debug = {
        mode: 'none',
        canonical_markers: [],
        canonical_resolved_ids: [],
        canonical_unresolved_ids: [],
        fallback_markers: [],
        links: [],
        source_map: ss.map((s, i) => ({
          index: i + 1,
          source_type: (s && s.source_type) || (s && s.wiki_source_id != null ? 'wiki' : 'chunk'),
          chunk_id: s && s.chunk_id,
          wiki_source_id: s && s.wiki_source_id,
          chapter_index: s && s.chapter_index,
          canonical_start: s && s.canonical_start,
          canonical_end: s && s.canonical_end,
          page_path: s && s.page_path,
        })),
      };
      const cHtml = (idx, mode, marker) => `<a href="#" class="citation-link${mode==='fallback'?' citation-link-fallback':''}" data-source-idx="${idx}" data-citation-mode="${mode}" data-citation-marker="${escapeAttr(marker)}">[${idx+1}]</a>`;
      const used = new Set();
      const canonical = /\[([cw]):([^\]]+)\]/gi;
      let last = 0, match; const parts = [];
      while ((match = canonical.exec(raw)) !== null) {
        parts.push(escapeHtml(raw.slice(last, match.index)));
        const rawMarker = String(match[0]); debug.canonical_markers.push(rawMarker);
        const sourceType = String(match[1] || '').toLowerCase() === 'w' ? 'wiki' : 'chunk';
        const sourceMap = sourceType === 'wiki' ? wikiMap : chunkMap;
        const ids = [...String(match[2]).matchAll(/\d+/g)].map(m => m[0]);
        const links = [];
        ids.forEach(id => {
          const idx = sourceMap.has(id) ? sourceMap.get(id) : -1;
          if (idx >= 0) {
            used.add(idx);
            debug.canonical_resolved_ids.push(`${sourceType}:${id}`);
            debug.links.push({ mode: 'canonical', marker: rawMarker, source_index: idx + 1, source_type: sourceType, source_id: id });
            links.push(cHtml(idx, 'canonical', rawMarker));
          } else {
            debug.canonical_unresolved_ids.push(`${sourceType}:${id}`);
          }
        });
        parts.push(links.length ? links.join(' ') : escapeHtml(rawMarker));
        last = match.index + rawMarker.length;
      }
      parts.push(escapeHtml(raw.slice(last)));
      let html = parts.join('');
      if (used.size === 0) {
        html = html.replace(/【\s*(\d+)\s*】|\[\s*(\d+)\s*\]|\(\s*(\d+)\s*\)/g, (full, a, b, c) => {
          const num = parseInt(a||b||c, 10); if (!Number.isFinite(num)) return full; const idx = num - 1;
          if (idx < 0 || idx >= ss.length) return full;
          debug.fallback_markers.push(full); debug.links.push({ mode: 'fallback', marker: full, source_index: idx+1, chunk_id: ss[idx] && ss[idx].chunk_id });
          return cHtml(idx, 'fallback', full);
        });
      }
      if (debug.links.length) debug.mode = debug.links.every(l => l.mode === 'canonical') ? 'canonical' : 'fallback';
      return { html, debug };
    }

    function formatCitationDebugText(debug) {
      if (!debug) return 'No citation debug data.';
      const lines = [`Mode: ${debug.mode}`];
      if (debug.source_map) debug.source_map.forEach(s => lines.push(`  [${s.index}] type=${s.source_type} chunk=${s.chunk_id} wiki=${s.wiki_source_id} ch=${s.chapter_index} canon=${s.canonical_start}-${s.canonical_end} page=${s.page_path || ''}`));
      return lines.join('\n');
    }

    function formatRetrievalPendingLabel(retrievalContext, generating) {
      const ctx = retrievalContext || null;
      if (!ctx) return generating ? 'Generating answer…' : 'Pulling spoiler-safe context…';
      const excerptCount = Math.max(0, parseInt(ctx.excerpt_count || 0, 10) || 0);
      const wikiSourceCount = Math.max(0, parseInt(ctx.wiki_source_count || 0, 10) || 0);
      const wiki = ctx.wiki || null;
      if (generating) {
        if (ctx.used_wiki && wiki && wiki.tag) return `Generating answer from wiki ${wiki.tag} and spoiler-safe text…`;
        if (ctx.used_wiki) return 'Generating answer from wiki and spoiler-safe text…';
        return 'Generating answer from spoiler-safe text…';
      }
      if (ctx.used_wiki && wiki && wiki.tag) {
        if (excerptCount > 0) {
          const wikiPart = wikiSourceCount > 0 ? ` (${wikiSourceCount} wiki section${wikiSourceCount === 1 ? '' : 's'})` : '';
          return `Pulled wiki ${wiki.tag}${wikiPart} and ${excerptCount} spoiler-safe text excerpt${excerptCount === 1 ? '' : 's'}…`;
        }
        return wikiSourceCount > 0
          ? `Pulled wiki ${wiki.tag} (${wikiSourceCount} wiki section${wikiSourceCount === 1 ? '' : 's'})…`
          : `Pulled wiki ${wiki.tag}…`;
      }
      if (excerptCount > 0) return `Pulled ${excerptCount} spoiler-safe text excerpt${excerptCount === 1 ? '' : 's'}…`;
      return 'Pulling spoiler-safe context…';
    }

    function formatRetrievalMeta(retrievalContext) {
      const ctx = retrievalContext || null;
      if (!ctx) return '';
      const excerptCount = Math.max(0, parseInt(ctx.excerpt_count || 0, 10) || 0);
      const wikiSourceCount = Math.max(0, parseInt(ctx.wiki_source_count || 0, 10) || 0);
      const wiki = ctx.wiki || null;
      const parts = [];
      if (ctx.used_wiki && wiki && wiki.tag) {
        parts.push(`Context: wiki ${wiki.tag}`);
      } else if (ctx.used_wiki) {
        parts.push('Context: wiki background');
      } else {
        parts.push('Context: text retrieval only');
      }
      if (wikiSourceCount > 0) parts.push(`${wikiSourceCount} wiki section${wikiSourceCount === 1 ? '' : 's'}`);
      if (excerptCount > 0) parts.push(`${excerptCount} spoiler-safe text excerpt${excerptCount === 1 ? '' : 's'}`);
      const pageTitles = Array.isArray(wiki && wiki.pages) ? wiki.pages.map(p => p && p.title).filter(Boolean) : [];
      if (pageTitles.length) parts.push(`Pages: ${pageTitles.slice(0, 4).join(', ')}`);
      return parts.join('\n');
    }

    function buildFollowUpComposer(rootEntry) {
      const box = document.createElement('div');
      box.className = 'qa-followup-composer';

      const header = document.createElement('div');
      header.className = 'qa-followup-composer-header';
      const label = document.createElement('span');
      label.textContent = 'Following up on this answer';
      const cancel = document.createElement('button');
      cancel.type = 'button';
      cancel.title = 'Cancel follow-up';
      cancel.textContent = '✕';
      cancel.addEventListener('click', () => {
        state.followUpComposerSessionId = null;
        renderAnswerHistory();
      });
      header.append(label, cancel);

      const ta = document.createElement('textarea');
      ta.placeholder = 'Ask a follow-up about this answer…';
      ta.rows = 2;
      ta.addEventListener('keydown', (e) => {

    async function askQuestion() {
      const question = els.qaInput.value.trim();
      if (!question || state.isAsking || !state.currentBookId) return;
      if (state.currentBook && state.currentBook.embedding_status !== 'ready') { alert('This book is still indexing.'); return; }
      state.isAsking = true; els.qaSendBtn.disabled = true; els.qaInput.value = '';
      const entry = { question, answer: '', sources: [], retrieval_context: null, openclaw_session_id: null, followUps: [], pending_label: 'Pulling spoiler-safe context…', answer_started: false, position_context: state.currentPosition && state.currentPosition.position_index != null ? state.currentPosition.position_index : null, ask_cfi: null, ask_chapter_index: state.currentPosition && state.currentPosition.chapter_index != null ? state.currentPosition.chapter_index : null, ask_chapter_percent: state.currentPosition && state.currentPosition.chapter_percent != null ? state.currentPosition.chapter_percent : null, ask_book_percent: state.currentPosition && state.currentPosition.book_percent != null ? state.currentPosition.book_percent : null, ask_char_offset: Number.isFinite(state.currentCharOffset) ? state.currentCharOffset : null, timestamp: new Date().toISOString(), pending: true };
      state.followUpComposerSessionId = null;
      pushAnswerHistory(entry); openQaPanel();
      try {
        const res = await fetch(`/api/books/${state.currentBookId}/query`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question, position_index: entry.position_context, model: els.qaModelSelect.value, ask_chapter_index: entry.ask_chapter_index, ask_chapter_percent: entry.ask_chapter_percent, ask_book_percent: entry.ask_book_percent, ask_char_offset: entry.ask_char_offset }) });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Query failed'); }
        const reader = res.body.getReader(); const decoder = new TextDecoder(); let buffer = '';
        while (true) {
          const { value, done } = await reader.read(); if (done) break;
          buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n'); buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.trim()) continue;
            const ev = JSON.parse(line);
            if (ev.type === 'status') {
              entry.retrieval_context = ev.data || null;
              entry.pending_label = formatRetrievalPendingLabel(entry.retrieval_context, false);
              renderAnswerHistory();
            } else if (ev.type === 'delta') {
              if (!entry.answer_started) {
                entry.answer_started = true;
                entry.pending_label = formatRetrievalPendingLabel(entry.retrieval_context, true);
              }
              entry.answer += ev.delta || '';
              renderAnswerHistory();
            } else if (ev.type === 'done') {
              entry.answer = ev.data && ev.data.answer ? ev.data.answer : entry.answer;
              entry.sources = ev.data && ev.data.sources ? ev.data.sources : [];
              entry.retrieval_context = ev.data && ev.data.retrieval_context ? ev.data.retrieval_context : entry.retrieval_context;
              if (ev.data && ev.data.openclaw_session_id) entry.openclaw_session_id = ev.data.openclaw_session_id;
              entry.pending = false;
              renderAnswerHistory();
            } else if (ev.type === 'error') {
              entry.pending = false;
              entry.error = ev.error || 'Unknown error';
              renderAnswerHistory();
            }
          }
        }
        if (buffer.trim()) {
          const ev = JSON.parse(buffer);
          if (ev.type === 'status') {
            entry.retrieval_context = ev.data || null;
          } else if (ev.type === 'done') {
            entry.answer = ev.data && ev.data.answer ? ev.data.answer : entry.answer;
            entry.sources = ev.data && ev.data.sources ? ev.data.sources : [];
            entry.retrieval_context = ev.data && ev.data.retrieval_context ? ev.data.retrieval_context : entry.retrieval_context;
            if (ev.data && ev.data.openclaw_session_id) entry.openclaw_session_id = ev.data.openclaw_session_id;
          } else if (ev.type === 'error') entry.error = ev.error;
        }
      } catch (err) { entry.error = err.message; }
      finally { entry.pending = false; state.isAsking = false; els.qaSendBtn.disabled = false; renderAnswerHistory(); }
    }

    async function askFollowUp(rootEntry, question) {
      if (!question || state.isAsking || !state.currentBookId) return;
      const sessionId = rootEntry && rootEntry.openclaw_session_id;
      if (!sessionId) return;
      state.isAsking = true;
      els.qaSendBtn.disabled = true;
      const followEntry = {
        question,
        answer: '',
        sources: [],
        retrieval_context: { follow_up: true },
        openclaw_session_id: sessionId,
        pending_label: 'Generating follow-up answer…',
        answer_started: false,
        position_context: rootEntry.position_context,
        ask_cfi: rootEntry.ask_cfi || null,
        ask_chapter_index: rootEntry.ask_chapter_index,
        ask_chapter_percent: rootEntry.ask_chapter_percent,
        ask_book_percent: rootEntry.ask_book_percent,
        ask_char_offset: rootEntry.ask_char_offset,
        timestamp: new Date().toISOString(),
        pending: true,
      };
      if (!Array.isArray(rootEntry.followUps)) rootEntry.followUps = [];
      rootEntry.followUps.push(followEntry);
      state.followUpComposerSessionId = null;
      renderAnswerHistory();
      try {
        const res = await fetch(`/api/books/${state.currentBookId}/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            model: els.qaModelSelect.value,
            follow_up_to: sessionId,
          }),
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || 'Follow-up failed'); }
        const reader = res.body.getReader(); const decoder = new TextDecoder(); let buffer = '';
        while (true) {
          const { value, done } = await reader.read(); if (done) break;
          buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n'); buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.trim()) continue;
            const ev = JSON.parse(line);
            if (ev.type === 'delta') {
              if (!followEntry.answer_started) { followEntry.answer_started = true; followEntry.pending_label = 'Generating follow-up answer…'; }
              followEntry.answer += ev.delta || '';
              renderAnswerHistory();
            } else if (ev.type === 'done') {
              followEntry.answer = ev.data && ev.data.answer ? ev.data.answer : followEntry.answer;
              followEntry.retrieval_context = ev.data && ev.data.retrieval_context ? ev.data.retrieval_context : followEntry.retrieval_context;
              followEntry.pending = false;
              renderAnswerHistory();
            } else if (ev.type === 'error') {
              followEntry.pending = false;
              followEntry.error = ev.error || 'Unknown error';
              renderAnswerHistory();
            }
          }
        }
        if (buffer.trim()) {
          const ev = JSON.parse(buffer);
          if (ev.type === 'done') {
            followEntry.answer = ev.data && ev.data.answer ? ev.data.answer : followEntry.answer;
          } else if (ev.type === 'error') followEntry.error = ev.error;
        }
      } catch (err) { followEntry.error = err.message; }
      finally { followEntry.pending = false; state.isAsking = false; els.qaSendBtn.disabled = false; renderAnswerHistory(); }
    }

    function hydrateAnswerHistory(conversations) {
      const roots = [];
      const rootBySession = new Map();
      for (const c of (conversations || [])) {
        const entry = {
          question: c.question,
          answer: c.answer,
          sources: c.sources || [],
          retrieval_context: c.retrieval_context || null,
          openclaw_session_id: c.openclaw_session_id || null,
          pending_label: null,
          answer_started: true,
          position_context: c.position_context,
          ask_cfi: c.ask_cfi || null,
          ask_chapter_index: c.ask_chapter_index != null ? c.ask_chapter_index : null,
          ask_chapter_percent: c.ask_chapter_percent != null ? c.ask_chapter_percent : null,
          ask_book_percent: c.ask_book_percent != null ? c.ask_book_percent : null,
          ask_char_offset: c.ask_char_offset != null ? c.ask_char_offset : null,
          timestamp: c.created_at,
        };
        const isFollowUp = entry.retrieval_context && entry.retrieval_context.follow_up === true;
        if (isFollowUp && entry.openclaw_session_id && rootBySession.has(entry.openclaw_session_id)) {
          const root = rootBySession.get(entry.openclaw_session_id);
          if (!Array.isArray(root.followUps)) root.followUps = [];
          root.followUps.push(entry);
        } else {
          entry.followUps = [];
          roots.push(entry);
          if (entry.openclaw_session_id) rootBySession.set(entry.openclaw_session_id, entry);
        }
      }
      return roots.slice(-40);
    }

      const data = await fetchJson('/api/settings');
      els.modelSelect.innerHTML = ''; els.qaModelSelect.innerHTML = '';
      (data.models || []).forEach(model => { for (const sel of [els.modelSelect, els.qaModelSelect]) { const o = document.createElement('option'); o.value = model; o.textContent = model; sel.appendChild(o); } });
      applySettingsData(data);
    }

    async function saveSettings() {
      const payload = { model: els.modelSelect.value, reader_font_size: clamp(parseInt(els.fontSizeInput.value || '100', 10), 70, 160), reader_spread: els.spreadSelect.value, reader_mode: els.readerModeSelect.value || 'auto', reader_width_px: Math.round(asNumber(els.readerWidthInput.value, 980)), citation_debug_mode: !!els.citationDebugInput.checked };
      const key = els.apiKeyInput.value.trim(); if (key) payload.api_key = key;
      const data = await fetchJson('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      applySettingsData(data, { closeSettings: true, scheduleReflow: true });
    }

    function openSettings() {
      if (!state.settings) return;
      populateSettingsForm();
      els.settingsModal.classList.add('open');
      els.apiKeyInput.focus();
    }
    function closeSettings() { els.settingsModal.classList.remove('open'); }

    async function loadBooks() { const data = await fetchJson('/api/books'); state.books = data.books || []; renderBooks(); }

    function buildCover(book) {
      const wrap = document.createElement('div'); wrap.className = 'book-cover-wrap';
      const media = document.createElement('div');
      const img = document.createElement('img'); img.className = 'book-cover'; img.loading = 'lazy'; img.alt = `Cover for ${book.title}`; img.src = `/api/books/${book.id}/cover`;
      img.onerror = () => { const f = document.createElement('div'); f.className = 'book-cover fallback'; f.textContent = book.title || 'Untitled'; media.replaceChildren(f); };
      media.appendChild(img);
      wrap.appendChild(media);
      if (book.wiki && book.wiki.url) {
        const actions = document.createElement('div'); actions.className = 'book-cover-actions';
        const link = document.createElement('a'); link.className = 'book-cover-link'; link.href = book.wiki.url; link.target = '_blank'; link.rel = 'noopener'; link.textContent = 'Open Wiki';
        link.addEventListener('click', event => event.stopPropagation());
        actions.appendChild(link);
        wrap.appendChild(actions);
      }
      return wrap;
    }

    function renderBooks() {
      els.booksGrid.innerHTML = '';
      if (!state.books.length) { const e = document.createElement('div'); e.className = 'empty-state'; e.innerHTML = '<strong>Drop an EPUB to start reading.</strong><br />Imports and indexing happen locally on this machine.'; els.booksGrid.appendChild(e); return; }
      state.books.forEach(book => {
        const card = document.createElement('article'); card.className = 'book-card';
        const del = document.createElement('button'); del.className = 'book-delete'; del.title = 'Delete book'; del.textContent = '×';
        del.addEventListener('click', async event => { event.stopPropagation(); if (!confirm(`Delete "${book.title}"?`)) return; try { const r = await fetch(`/api/books/${book.id}`, { method: 'DELETE' }); if (!r.ok) { const e = await r.json(); throw new Error(e.detail); } await loadBooks(); } catch(e) { alert(`Delete failed: ${e.message}`); } });
        card.appendChild(del); card.appendChild(buildCover(book));
        const meta = document.createElement('div'); meta.className = 'book-meta';
        const title = document.createElement('h3'); title.className = 'book-title'; title.textContent = book.title || 'Untitled';
        const author = document.createElement('p'); author.className = 'book-author'; author.textContent = book.author || 'Unknown';
        const cl = book.chapter_index != null ? `Chapter ${book.chapter_index + 1}${book.chapter_title ? ` · ${book.chapter_title}` : ''}` : 'Not started';
        const progress = Number(book.book_percent || 0);
        const sub = document.createElement('p'); sub.className = 'book-sub'; sub.textContent = `${Math.round(progress)}% · ${cl}`;
        const last = document.createElement('p'); last.className = 'book-sub'; last.textContent = relativeTime(book.last_read_at);
        const status = document.createElement('div');
        if (book.embedding_status === 'processing') status.innerHTML = '<span class="status-pill">Indexing...</span>';
        else if (book.embedding_status === 'failed') status.innerHTML = '<span class="status-pill" style="background:#cc6b5a;color:#240f0b;">Index failed</span>';
        const pb = document.createElement('div'); pb.className = 'book-progress'; pb.innerHTML = `<span style="width:${clamp(progress, 0, 100)}%"></span>`;
        meta.append(title, author, sub, last, status, pb); card.appendChild(meta);
        card.onclick = () => navigate(`/read/${book.id}`);
        els.booksGrid.appendChild(card);
      });
    }

    async function importBook(file) {
      if (!file) return; const form = new FormData(); form.append('file', file); els.importStatus.textContent = 'Importing and indexing…';
      try { const res = await fetch('/api/books/import', { method: 'POST', body: form }); const data = await res.json(); if (!res.ok) throw new Error(data.detail || 'Import failed'); els.importStatus.textContent = `Imported "${data.title}" (${data.total_chunks} chunks).`; await loadBooks(); }
      catch (err) { els.importStatus.textContent = `Import failed: ${err.message}`; }
    }

    /* ─────────── Route & Model ─────────── */
    async function route() {
      const id = getBookIdFromPath();
      if (!id) { showLibrary(); await loadBooks(); return; }
      try { await openReader(id); }
      catch (err) { console.error('Reader failed', err); els.readerStatus.textContent = `Could not render: ${err.message}`; els.readerStatus.classList.add('visible'); alert(`Failed to open reader: ${err.message}`); navigate('/'); }
    }

    function setModel(model) { state.settings.model = model; els.modelSelect.value = model; els.qaModelSelect.value = model; fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model }) }).catch(() => {}); }

    function adjustFont(delta) {
      const next = clamp((state.settings && state.settings.reader_font_size || 100) + delta, 70, 160);
      state.settings.reader_font_size = next; applyReaderFontSize(next); scheduleReflow();
      fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reader_font_size: next }) }).catch(() => {});
    }

    /* ─────────── Event Binding ─────────── */
    function bindEvents() {
      els.importBtn.addEventListener('click', () => els.epubInput.click());
      els.epubInput.addEventListener('change', e => { const f = e.target.files && e.target.files[0]; if (f) importBook(f); e.target.value = ''; });
      els.settingsBtn.addEventListener('click', openSettings);
      els.readerSettings.addEventListener('click', openSettings);
      els.cancelSettings.addEventListener('click', async () => { closeSettings(); try { await loadSettings(); } catch(e){} });
      els.saveSettings.addEventListener('click', async () => { try { await saveSettings(); } catch(e) { alert(`Failed: ${e.message}`); } });
      els.settingsModal.addEventListener('click', async e => { if (e.target === els.settingsModal) { closeSettings(); try { await loadSettings(); } catch(e){} } });
      els.backToLibrary.addEventListener('click', () => { destroyReader(); navigate('/'); });
      els.turnLeft.addEventListener('click', () => turnPage('prev'));
      els.turnRight.addEventListener('click', () => turnPage('next'));
      els.prevPageBtn.addEventListener('click', () => turnPage('prev'));
      els.nextPageBtn.addEventListener('click', () => turnPage('next'));
      els.readerControlsToggle.addEventListener('click', () => setControlsCollapsed(!state.controlsCollapsed));
      els.readerControls.addEventListener('transitionend', event => { if (event.target !== els.readerControls || (event.propertyName !== 'max-height' && event.propertyName !== 'opacity')) return; syncViewportMetrics(); scheduleReflow(); });
      els.tocBtn.addEventListener('click', () => toggleReaderPanel('toc'));
      els.detectChaptersBtn.addEventListener('click', detectVirtualChaptersPrompt);
      if (els.virtualChapterModeBtn) els.virtualChapterModeBtn.addEventListener('click', toggleVirtualChapterMode);
      els.virtualChaptersToggleBtn.addEventListener('click', toggleVirtualChaptersEnabled);
      if (els.tocDisplayModeBtn) els.tocDisplayModeBtn.addEventListener('click', toggleTocDisplayMode);
      els.clearVirtualChaptersBtn.addEventListener('click', clearVirtualChapters);
      els.syncBtn.addEventListener('click', checkServerSync);
      els.syncGoLatestBtn.addEventListener('click', async () => {
        const pos = state.syncPromptPosition;
        if (!pos) return;
        try { await moveToSyncedPosition(pos); }
        catch (err) { console.error('Failed to move to synced position', err); showReaderStatusMessage('Failed to jump to latest position.'); }
      });
      els.syncStayBtn.addEventListener('click', () => {
        const pos = state.syncPromptPosition;
        state.syncPromptDismissedKey = syncPromptKey(pos);
        clearSyncPrompt();
        showReaderStatusMessage('Keeping current location.');
      });
      els.tocCloseBtn.addEventListener('click', closeReaderPanels);
      els.bookmarksBtn.addEventListener('click', () => toggleReaderPanel('bookmarks'));
      els.bookmarksCloseBtn.addEventListener('click', closeReaderPanels);
      els.bookmarkToggleBtn.addEventListener('click', toggleCurrentBookmark);
      document.addEventListener('keydown', handleReaderArrowShortcut);
      els.readerSurface.addEventListener('scroll', () => {
        if (!state.readerReady || !isScrollMode()) return;
        scheduleReaderScrollSync();
      }, { passive: true });
      els.qaFab.addEventListener('click', openQaPanel);
      els.qaCloseBtn.addEventListener('click', closeQaPanel);
      els.qaBackdrop.addEventListener('click', closeQaPanel);
      els.qaAskLocationLink.addEventListener('click', () => jumpToAskLocation());
      els.returnBtn.addEventListener('click', returnToReading);
      els.returnDismissBtn.addEventListener('click', clearReturnStack);
      els.qaMessages.addEventListener('click', event => {
        const link = closestFromEvent(event, '.citation-link'); if (!link) return; event.preventDefault();
        const idx = parseInt(link.dataset.sourceIdx || '', 10); if (!Number.isFinite(idx)) return;
        const entry = state.answerHistory[state.answerHistoryIndex];
        const source = entry && Array.isArray(entry.sources) ? entry.sources[idx] : null;
        if (!source) {
          readerDiag('citation:missing-source', { idx, answerHistoryIndex: state.answerHistoryIndex });
          return;
        }
        readerDiag('citation:click', {
          idx,
          chapter_index: source.chapter_index,
          canonical_start: source.canonical_start,
          canonical_end: source.canonical_end,
        });
        jumpToSource(source).catch(err => {
          console.error('Citation jump failed', err, { idx, source });
        });
      });
      els.qaSendBtn.addEventListener('click', askQuestion);
      els.qaInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askQuestion(); } });
      els.qaBackBtn.addEventListener('click', () => { if (state.answerHistoryIndex > 0) { state.answerHistoryIndex--; renderAnswerHistory(); } });
      els.qaForwardBtn.addEventListener('click', () => { if (state.answerHistoryIndex < state.answerHistory.length - 1) { state.answerHistoryIndex++; renderAnswerHistory(); } });
      els.qaModelSelect.addEventListener('change', () => setModel(els.qaModelSelect.value));
      els.qaWikiSelect.addEventListener('change', onWikiSelectChange);
      els.readerSearchRun.addEventListener('click', async () => { try { await runReaderSearch(); } catch(e) { updateReaderSearchStatus('Search failed'); } });
      els.readerSearchInput.addEventListener('keydown', async event => { if (event.key !== 'Enter') return; event.preventDefault(); try { await runReaderSearch(); } catch(e) { updateReaderSearchStatus('Search failed'); } });
      els.readerSearchPrev.addEventListener('click', async () => { try { await cycleReaderSearchMatch(-1); } catch(e) { updateReaderSearchStatus('Jump failed'); } });
      els.readerSearchNext.addEventListener('click', async () => { try { await cycleReaderSearchMatch(1); } catch(e) { updateReaderSearchStatus('Jump failed'); } });
      els.chapterJumpSelect.addEventListener('change', async () => {
        const value = String(els.chapterJumpSelect.value || '');
        if (!value) return;
        if (value.startsWith('real:')) {
          const i = parseInt(value.slice(5), 10);
          if (Number.isFinite(i)) jumpToChapterByIndex(i);
          return;
        }
        if (value.startsWith('virtual:')) {
          const token = value.slice(8);
          const entry = resolveVirtualEntryByToken(token);
          if (!entry) return;
          await jumpToVirtualEntry(entry);
        }
      });
      els.readerSpreadSelect.addEventListener('change', () => setReaderSpread(els.readerSpreadSelect.value, true));
      els.spreadSelect.addEventListener('change', () => setReaderSpread(els.spreadSelect.value, false));
      if (els.readerModeSelect) els.readerModeSelect.addEventListener('change', () => setReaderMode(els.readerModeSelect.value, false));
      els.readerWidthInput.addEventListener('input', () => applyReaderWidth(els.readerWidthInput.value));
      els.fontMinus.addEventListener('click', () => adjustFont(-6));
      els.fontPlus.addEventListener('click', () => adjustFont(6));
      els.readerMain.addEventListener('click', event => { if (!els.tocPanel.classList.contains('open') && !els.bookmarksPanel.classList.contains('open')) return; if (!event.target.closest('#tocPanel, #bookmarksPanel, #tocBtn, #bookmarksBtn')) closeReaderPanels(); });
      window.addEventListener('resize', scheduleReflow);
      window.addEventListener('orientationchange', () => setTimeout(scheduleReflow, 150));
      if (window.visualViewport) window.visualViewport.addEventListener('resize', scheduleReflow);
      window.addEventListener('popstate', route);
    }

    /* ─────────── Init ─────────── */
    async function init() {
      window.addEventListener('unhandledrejection', event => console.error('Unhandled promise rejection:', event.reason));
      window.addEventListener('error', event => console.error('Unhandled error:', event.error || event.message));
      syncViewportMetrics(); bindEvents(); updateReaderSearchStatus('');
      try { await loadSettings(); } catch(e) { alert(`Failed to load settings: ${e.message}`); }
      await route();
    }

    init();
  </script>
</body>
</html>
